<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WTM Maroua — Je serai là</title>
<style>
:root{--blue:#1976D2;--teal:#00BFA5;--dark:#0D1B2A;--mid:#3B5068;--muted:#7A97B2;--line:#D4E6F5;--bg:#F0F7FF;--grad:linear-gradient(135deg,#1976D2,#00BFA5);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 20px 60px;}
.page-header{text-align:center;margin-bottom:32px;}
.page-header .brand{font-size:.75rem;text-transform:uppercase;letter-spacing:.14em;color:var(--teal);font-weight:700;margin-bottom:8px;}
.page-header h1{font-size:clamp(1.5rem,4vw,2.1rem);color:var(--dark);margin-bottom:6px;font-weight:800;}
.page-header h1 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.page-header p{font-size:.85rem;color:var(--muted);}
.layout{display:flex;gap:36px;align-items:flex-start;width:100%;max-width:1080px;flex-wrap:wrap;justify-content:center;}
.form-panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:32px;width:300px;box-shadow:0 4px 24px rgba(25,118,210,.08);flex-shrink:0;}
.form-panel h2{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:24px;display:flex;align-items:center;gap:8px;}
.form-panel h2::before{content:"";width:4px;height:18px;background:var(--grad);border-radius:2px;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:.75rem;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;}
.field input[type="text"]{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 14px;font-family:inherit;font-size:.875rem;color:var(--dark);outline:none;transition:border-color .2s,box-shadow .2s;}
.field input[type="text"]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(25,118,210,.1);}
.field input[type="text"]::placeholder{color:var(--muted);}
.upload-zone{border:2px dashed rgba(0,191,165,.4);border-radius:12px;padding:22px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(0,191,165,.03);position:relative;}
.upload-zone:hover{border-color:var(--teal);background:rgba(0,191,165,.07);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone .upload-icon{font-size:2rem;margin-bottom:6px;}
.upload-zone .upload-text{font-size:.8rem;color:var(--muted);}
.upload-zone .upload-text strong{color:var(--teal);}
.photo-preview{width:72px;height:72px;border-radius:50%;object-fit:cover;margin:0 auto 6px;display:block;border:3px solid var(--teal);}
.btn-generate{width:100%;background:var(--grad);border:none;color:#fff;padding:14px;border-radius:12px;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all .25s;box-shadow:0 4px 18px rgba(25,118,210,.3);}
.btn-generate:hover{transform:translateY(-2px);}
.btn-download{width:100%;background:linear-gradient(135deg,#00897B,#00BFA5);border:none;color:#fff;padding:13px;border-radius:12px;font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;margin-top:12px;transition:all .25s;display:none;}
.btn-download:hover{transform:translateY(-2px);}
.preview-panel{display:flex;flex-direction:column;align-items:center;gap:14px;}
.preview-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;}
.badge-wrapper{border-radius:16px;overflow:hidden;box-shadow:0 16px 50px rgba(25,118,210,.18);}
canvas{display:block;max-width:100%;}
.hint{font-size:.75rem;color:var(--muted);text-align:center;line-height:1.6;}
@media(max-width:640px){.form-panel{width:100%;max-width:400px;}.badge-wrapper canvas{max-width:320px !important;}}
</style>
</head>
<body>
<div class="page-header">
  <div class="brand">Women Techmakers Maroua · 2026</div>
  <h1>Je serai là — <em>Break the Pattern</em></h1>
  <p>Génère ton badge personnalisé </p>
</div>
<div class="layout">
  <div class="form-panel">
    <h2>Personnalise ton badge</h2>
    <div class="field">
      <label>Prénom et Nom</label>
      <input type="text" id="inputName" placeholder="Ex : Ange Nouga" oninput="liveUpdate()">
    </div>
    <div class="field">
      <label>Ta photo</label>
      <div class="upload-zone">
        <input type="file" id="inputPhoto" accept="image/*" onchange="loadPhoto(event)">
        <div id="uploadContent">
          <div class="upload-icon">📷</div>
          <div class="upload-text"><strong>Clique pour choisir</strong><br>ou glisse ta photo ici</div>
        </div>
      </div>
    </div>
    <button class="btn-generate" onclick="generateBadge()">🎨 Générer mon badge</button>
    <button class="btn-download" id="btnDownload" onclick="downloadBadge()">⬇️ Télécharger mon badge</button>
  </div>

  <div class="preview-panel">
    <div class="preview-label">Aperçu en temps réel</div>
    <div class="badge-wrapper">
      <canvas id="liveCanvas" width="1080" height="1080" style="max-width:480px;display:block;"></canvas>
    </div>
   <!-- <div class="hint">Format carré 1080 × 1080 px<br>Optimisé pour Facebook, Instagram & WhatsApp</div>-->
  </div>
</div>

function loadPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      photoImg=img;
      document.getElementById("uploadContent").innerHTML=
        `<img src="${ev.target.result}" class="photo-preview"><div class="upload-text"><strong>Photo chargée ✓</strong><br>Clique pour changer</div>`;
      liveUpdate();
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

  userName=document.getElementById("inputName").value.trim();

}

}

// ── HELPERS ──
function rrPath(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawHex(ctx,x,y,size,color){
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=(Math.PI/180)*(60*i-30);const px=x+size*Math.cos(a),py=y+size*Math.sin(a);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}
  ctx.closePath();ctx.fillStyle=color;ctx.fill();
}

function drawCalendarIcon(ctx,x,y,sz){
  ctx.save();
  ctx.fillStyle="#fff";ctx.strokeStyle="rgba(200,210,220,0.5)";ctx.lineWidth=1;
  rrPath(ctx,x,y,sz,sz,sz*0.12);ctx.fill();ctx.stroke();
  ctx.fillStyle="#E53935";rrPath(ctx,x,y,sz,sz*0.32,sz*0.12);ctx.fill();
  ctx.fillRect(x,y+sz*0.2,sz,sz*0.12);
  ctx.strokeStyle="rgba(180,190,200,0.6)";ctx.lineWidth=0.8;
  [[0.33,0.42,0.33,0.92],[0.66,0.42,0.66,0.92],[0.1,0.62,0.9,0.62],[0.1,0.78,0.9,0.78]]
    .forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x+sz*x1,y+sz*y1);ctx.lineTo(x+sz*x2,y+sz*y2);ctx.stroke();});
  ctx.strokeStyle="#fff";ctx.lineWidth=sz*0.09;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(x+sz*0.3,y+sz*0.04);ctx.lineTo(x+sz*0.3,y+sz*0.26);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+sz*0.7,y+sz*0.04);ctx.lineTo(x+sz*0.7,y+sz*0.26);ctx.stroke();
  ctx.fillStyle="#5C6BC0";
  [[0.17,0.5],[0.5,0.5],[0.83,0.5],[0.17,0.7],[0.5,0.7],[0.83,0.7],[0.17,0.87],[0.5,0.87]]
    .forEach(([dx,dy])=>{ctx.beginPath();ctx.arc(x+sz*dx,y+sz*dy,sz*0.06,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}

function drawPinIcon(ctx,x,y,sz){
  ctx.save();
  const cx=x+sz*0.5,cy=y+sz*0.38,r=sz*0.38;
  const g=ctx.createRadialGradient(cx-r*0.2,cy-r*0.2,0,cx,cy,r);
  g.addColorStop(0,"#EF5350");g.addColorStop(1,"#C62828");
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#C62828";ctx.beginPath();
  ctx.moveTo(cx-r*0.55,cy+r*0.55);ctx.quadraticCurveTo(cx,cy+r*2.2,cx,cy+r*1.8);
  ctx.quadraticCurveTo(cx,cy+r*2.2,cx+r*0.55,cy+r*0.55);ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.85)";ctx.beginPath();ctx.arc(cx,cy,r*0.38,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── MAIN DRAW ──
function drawBadge(ctx,W,H){
  ctx.fillStyle="#FFFFFF";ctx.fillRect(0,0,W,H);

  // Watercolor blobs
  const blobT=ctx.createRadialGradient(W*0.85,H*0.06,0,W*0.85,H*0.06,W*0.45);
  blobT.addColorStop(0,"rgba(0,191,165,0.14)");blobT.addColorStop(1,"rgba(0,191,165,0)");
  ctx.fillStyle=blobT;ctx.fillRect(0,0,W,H*0.45);
  const blobT2=ctx.createRadialGradient(W*0.12,H*0.08,0,W*0.12,H*0.08,W*0.3);
  blobT2.addColorStop(0,"rgba(25,118,210,0.10)");blobT2.addColorStop(1,"rgba(25,118,210,0)");
  ctx.fillStyle=blobT2;ctx.fillRect(0,0,W,H*0.35);
  const blobB=ctx.createRadialGradient(W*0.2,H*0.92,0,W*0.2,H*0.92,W*0.42);
  blobB.addColorStop(0,"rgba(0,191,165,0.13)");blobB.addColorStop(1,"rgba(0,191,165,0)");
  ctx.fillStyle=blobB;ctx.fillRect(0,H*0.65,W,H*0.35);
  const blobB2=ctx.createRadialGradient(W*0.82,H*0.94,0,W*0.82,H*0.94,W*0.28);
  blobB2.addColorStop(0,"rgba(25,118,210,0.09)");blobB2.addColorStop(1,"rgba(25,118,210,0)");
  ctx.fillStyle=blobB2;ctx.fillRect(0,H*0.72,W,H*0.28);

  // Hex decos
  drawHex(ctx,W-90,120,80,"rgba(0,191,165,0.12)");
  drawHex(ctx,W-28,230,52,"rgba(25,118,210,0.09)");
  drawHex(ctx,W-160,50,42,"rgba(0,191,165,0.07)");
  drawHex(ctx,60,H-130,78,"rgba(0,191,165,0.10)");
  drawHex(ctx,110,H-60,44,"rgba(25,118,210,0.08)");

  // Top gradient band
  const topG=ctx.createLinearGradient(0,0,W,0);topG.addColorStop(0,"#1976D2");topG.addColorStop(1,"#00BFA5");
  ctx.fillStyle=topG;ctx.fillRect(0,0,W,14);

  // ── LOGO + WTM (top left) ──
  const lsz=100,lx=28,ly=28;
  if(logoImg){
    ctx.save();ctx.beginPath();ctx.arc(lx+lsz/2,ly+lsz/2,lsz/2,0,Math.PI*2);ctx.clip();
    ctx.drawImage(logoImg,lx,ly,lsz,lsz);ctx.restore();
  }
  ctx.fillStyle="#0D1B2A";ctx.font="bold 32px Segoe UI, Arial";ctx.textAlign="left";
  ctx.fillText("Women Techmakers",lx+lsz+16,ly+40);
  ctx.fillStyle="#00BFA5";ctx.font="bold 32px Segoe UI, Arial";
  ctx.fillText("Maroua",lx+lsz+16,ly+76);

  // ── GOOGLE DEVELOPERS + GDG (top right) ──
  ctx.save();
  ctx.font="bold 28px Segoe UI, Arial";
  const gdColors=["#4285F4","#EA4335","#FBBC05","#4285F4","#34A853","#EA4335"];
  const gdLetters="Google".split("");
  const devText=" Developers";
  let totalGW=0;
  gdLetters.forEach(c=>{totalGW+=ctx.measureText(c).width;});
  totalGW+=ctx.measureText(devText).width;
  let curGX=W-28-totalGW;
  const gy=ly+36;
  gdLetters.forEach((c,i)=>{ctx.fillStyle=gdColors[i];ctx.textAlign="left";ctx.fillText(c,curGX,gy);curGX+=ctx.measureText(c).width;});
  ctx.fillStyle="#5F6368";ctx.fillText(devText,curGX,gy);
  ctx.textAlign="right";ctx.fillStyle="#7A97B2";ctx.font="25px Segoe UI, Arial";
  ctx.fillText("GDG Maroua",W-28,ly+76);
  ctx.restore();

  // ── JE SERAI LÀ ──
  ctx.fillStyle="#1976D2";ctx.font="bold 80px Georgia, serif";ctx.textAlign="center";
  ctx.fillText("JE SERAI LÀ",W/2,230);
  ctx.fillStyle="#3B5068";ctx.font="italic 28px Georgia, serif";
  ctx.fillText("Au WTM day Maroua 2026",W/2,275);

  // Separator
  const sepG=ctx.createLinearGradient(80,0,W-80,0);sepG.addColorStop(0,"#1976D2");sepG.addColorStop(1,"#00BFA5");
  ctx.strokeStyle=sepG;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(80,300);ctx.lineTo(W-80,300);ctx.stroke();

  // ── PHOTO CIRCLE ──
  const cx=W/2,cy=510,r=168;
  ctx.save();ctx.shadowColor="rgba(25,118,210,0.22)";ctx.shadowBlur=40;
  ctx.beginPath();ctx.arc(cx,cy,r+10,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.restore();
  const ringG=ctx.createLinearGradient(cx-r,cy-r,cx+r,cy+r);ringG.addColorStop(0,"#1976D2");ringG.addColorStop(1,"#00BFA5");
  ctx.beginPath();ctx.arc(cx,cy,r+10,0,Math.PI*2);ctx.strokeStyle=ringG;ctx.lineWidth=7;ctx.stroke();
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
  if(photoImg){
    const s=Math.max((r*2)/photoImg.width,(r*2)/photoImg.height);
    ctx.drawImage(photoImg,cx-(photoImg.width*s)/2,cy-(photoImg.height*s)/2,photoImg.width*s,photoImg.height*s);
  } else {
    const pg=ctx.createLinearGradient(cx-r,cy-r,cx+r,cy+r);
    pg.addColorStop(0,"#E3F2FD");pg.addColorStop(1,"#E0F7F4");ctx.fillStyle=pg;ctx.fillRect(cx-r,cy-r,r*2,r*2);
    const camW=140,camH=100,camX=cx-70,camY=cy-60;
    ctx.fillStyle="rgba(25,118,210,0.22)";rrPath(ctx,camX,camY+24,camW,camH-24,14);ctx.fill();
    rrPath(ctx,camX+38,camY+7,64,22,8);ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy+20,34,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,0.55)";ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy+20,22,0,Math.PI*2);ctx.fillStyle="rgba(25,118,210,0.28)";ctx.fill();
    ctx.fillStyle="rgba(25,118,210,0.45)";ctx.font="bold 22px Segoe UI, Arial";ctx.textAlign="center";
    ctx.fillText("Ta photo ici",cx,cy+90);
  }
  ctx.restore();

  // ── NAME ──
  ctx.textAlign="center";ctx.fillStyle="#0D1B2A";
  const displayName=userName||"Ton Prénom Nom";
  ctx.font="bold 46px Segoe UI, Arial";
  if(ctx.measureText(displayName).width>W-100)ctx.font="bold 36px Segoe UI, Arial";
  ctx.fillText(displayName,W/2,748);
  ctx.fillStyle="#7A97B2";ctx.font="22px Segoe UI, Arial";
  ctx.fillText("Participant(e)  ·  Maroua, Extrême-Nord",W/2,786);

  // ── INFO CARDS ──
  const ISZ=42;
  const card1x=70, card2x=W/2+10, cardy=820, cardw=W/2-80, cardh=148;

  // Card 1 — Date (fond bleu léger)
  ctx.save();ctx.shadowColor="rgba(25,118,210,0.12)";ctx.shadowBlur=20;
  const c1g=ctx.createLinearGradient(card1x,cardy,card1x+cardw,cardy+cardh);
  c1g.addColorStop(0,"rgba(227,242,253,0.97)");c1g.addColorStop(1,"rgba(225,245,254,0.97)");
  ctx.fillStyle=c1g;rrPath(ctx,card1x,cardy,cardw,cardh,22);ctx.fill();ctx.restore();
  ctx.strokeStyle="rgba(25,118,210,0.25)";ctx.lineWidth=2;
  rrPath(ctx,card1x,cardy,cardw,cardh,22);ctx.stroke();
  // barre top card1
  const c1bar=ctx.createLinearGradient(card1x,cardy,card1x+cardw,cardy);
  c1bar.addColorStop(0,"#1976D2");c1bar.addColorStop(1,"#42A5F5");
  ctx.fillStyle=c1bar;rrPath(ctx,card1x,cardy,cardw,8,4);ctx.fill();
  // icone + texte card1
  drawCalendarIcon(ctx,card1x+18,cardy+22,ISZ);
  ctx.textAlign="left";ctx.fillStyle="#0D1B2A";ctx.font="bold 26px Arial, sans-serif";
  ctx.fillText("28 Mars 2026",card1x+ISZ+28,cardy+56);
  ctx.fillStyle="#1976D2";ctx.font="bold 22px Arial, sans-serif";
  ctx.fillText("WTM Day Maroua",card1x+ISZ+28,cardy+88);

  // Card 2 — Lieu (fond teal léger)
  ctx.save();ctx.shadowColor="rgba(0,191,165,0.12)";ctx.shadowBlur=20;
  const c2g=ctx.createLinearGradient(card2x,cardy,card2x+cardw,cardy+cardh);
  c2g.addColorStop(0,"rgba(224,247,245,0.97)");c2g.addColorStop(1,"rgba(232,245,233,0.97)");
  ctx.fillStyle=c2g;rrPath(ctx,card2x,cardy,cardw,cardh,22);ctx.fill();ctx.restore();
  ctx.strokeStyle="rgba(0,191,165,0.28)";ctx.lineWidth=2;
  rrPath(ctx,card2x,cardy,cardw,cardh,22);ctx.stroke();
  // barre top card2
  const c2bar=ctx.createLinearGradient(card2x,cardy,card2x+cardw,cardy);
  c2bar.addColorStop(0,"#00BFA5");c2bar.addColorStop(1,"#26C6DA");
  ctx.fillStyle=c2bar;rrPath(ctx,card2x,cardy,cardw,8,4);ctx.fill();
  // icone + texte card2
  drawPinIcon(ctx,card2x+18,cardy+24,ISZ*0.9);
  ctx.textAlign="left";ctx.fillStyle="#0D1B2A";ctx.font="bold 26px Arial, sans-serif";
  ctx.fillText("CEDC, Maroua",card2x+ISZ+28,cardy+56);
  ctx.fillStyle="#00897B";ctx.font="bold 22px Arial, sans-serif";
  ctx.fillText("Extrême-Nord, Cameroun",card2x+ISZ+28,cardy+88);

  // ── BREAK THE PATTERN ──
  ctx.textAlign="center";
  const btpG=ctx.createLinearGradient(100,0,W-100,0);btpG.addColorStop(0,"#1976D2");btpG.addColorStop(1,"#00BFA5");
  ctx.fillStyle=btpG;ctx.font="bold italic 36px Georgia, serif";
  ctx.fillText('"Break the Pattern"',W/2,1012);
  ctx.fillStyle="rgba(120,160,195,0.7)";ctx.font="17px Segoe UI, Arial";
  ctx.fillText("#BreakThePattern  ·  #WTMMaroua  ·  #WomenTechmakers",W/2,1042);

  // Bottom band
  const botG=ctx.createLinearGradient(0,0,W,0);botG.addColorStop(0,"#0D1B2A");botG.addColorStop(1,"#1A3348");
  ctx.fillStyle=botG;ctx.fillRect(0,H-14,W,14);
}

function downloadBadge(){
  // Download at full 1080x1080
  const cv=document.createElement("canvas");cv.width=1080;cv.height=1080;
  drawBadge(cv.getContext("2d"),1080,1080);
  const link=document.createElement("a");
  link.download="badge-wtm-"+(userName.replace(/\s+/g,"-").toLowerCase()||"maroua")+".png";
  link.href=cv.toDataURL("image/png");link.click();
}
